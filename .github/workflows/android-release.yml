name: 安卓发布

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: 构建APK

    steps:
      # 1. 拉取仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置 Java 环境（安卓构建必需）
      - name: 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3. 配置 Android SDK
      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      # 4. 配置 Node.js + 自动启用 pnpm（核心修改）
      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          corepack: true  # 启用Node原生Corepack，自动匹配package.json的pnpm版本

      # 5. 安装项目依赖
      - name: 安装项目依赖
        run: pnpm install --frozen-lockfile

      # 6. 前端资源构建（按你项目实际命令调整）
      - name: 构建前端资源
        run: pnpm build

      # 7. 安卓 APK 构建
      - name: 授予 gradlew 执行权限
        run: chmod +x android/gradlew

      - name: 构建 Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # 8. 上传 APK 产物，可在 Actions 页面下载
      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
