name: 安卓发布

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: 构建APK

    steps:
      # 1. 拉取仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装 pnpm（必须放在 setup-node 之前，官方标准顺序）
      - name: 安装 pnpm 10.26.2
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      # 3. 配置 Node.js 环境（pnpm 已存在，缓存功能才能正常生效）
      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 4. 安装 monorepo 全量依赖
      - name: 安装项目依赖
        run: pnpm install --no-frozen-lockfile

      # 5. 生成 Drizzle 数据库 schema 文件（仓库 README 必需步骤）
      - name: 生成数据库文件
        run: npx drizzle-kit generate

      # 6. 构建子包 react-native-streamable-http（仓库 README 必需步骤）
      - name: 构建原生 HTTP 依赖包
        run: |
          cd packages/react-native-streamable-http
          npm install
          npm run build

      # 7. 配置 Java 17 环境（安卓构建必需）
      - name: 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 8. 配置 Android SDK
      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      # 9. Expo 生成安卓原生工程（必须步骤，否则不存在 android 目录）
      - name: 生成安卓原生项目
        run: npx expo prebuild -p android --no-install

      # 10. 构建 Release APK
      - name: 赋予 gradlew 执行权限
        run: chmod +x android/gradlew

      - name: 执行安卓打包
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # 11. 上传 APK 产物，构建完成可在 Actions 页面下载
      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
